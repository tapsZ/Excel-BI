<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" font-family="'Comic Sans MS','Comic Neue','Segoe Print','Bradley Hand','Chalkboard SE',cursive" role="img" aria-label="Why Excel breaks down: an analyst pulls data from many sources into Excel spreadsheets. Three teams (Sales, Finance, Marketing) each spawn a chain of versions — V1, V1.1, Final, Final Final, Final V2 — over weeks, so a big red cross marks the whole thing as chaos, and managers are left confused. The drawbacks: chaos, manual, outdated, no refresh, hard to connect, big data, can't collaborate, unsecured, no access control.">
  <defs>
    <filter id="rough" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#F2A20C"/></marker>
    <g id="xl">
      <rect x="0" y="8" width="34" height="56" rx="2" fill="#217346"/>
      <text x="5" y="46" font-size="22" font-weight="800" fill="#ffffff" font-family="Arial, sans-serif">X</text>
      <rect x="18" y="2" width="48" height="52" rx="2" fill="#ffffff" stroke="#3b3a38" stroke-width="1.6"/>
      <rect x="24" y="26" width="6" height="14" fill="#4caf6a"/><rect x="33" y="18" width="6" height="22" fill="#2e8b57"/><rect x="42" y="22" width="6" height="18" fill="#4caf6a"/>
      <g stroke="#c8c3bf" stroke-width="1"><line x1="22" y1="45" x2="62" y2="45"/><line x1="22" y1="50" x2="62" y2="50"/></g>
    </g>
    <g id="an" stroke="#3b3a38" stroke-width="2" fill="none">
      <circle cx="0" cy="0" r="15" fill="#fff"/><circle cx="-5" cy="-2" r="3" fill="#3b3a38"/><circle cx="5" cy="-2" r="3" fill="#3b3a38"/><path d="M-7 7 q7 5 14 0"/><path d="M-9 19 L0 14 L9 19" fill="#8a2b4a" stroke="#8a2b4a"/>
    </g>
    <g id="mgr" stroke="#6b6f76" stroke-width="2">
      <circle cx="0" cy="0" r="13" fill="#eef1f4"/><circle cx="-4" cy="-1" r="2.4" fill="#3b3a38" stroke="none"/><circle cx="4" cy="-1" r="2.4" fill="#3b3a38" stroke="none"/><path d="M-5 7 q5 -4 10 0" fill="none"/><path d="M-16 30 a16 17 0 0 1 32 0 z" fill="#eef1f4"/><rect x="-3.5" y="16" width="7" height="12" fill="#c0392b" stroke="none"/>
    </g>
  </defs>

  <rect width="1600" height="720" fill="#ffffff"/>

  <g filter="url(#rough)">
    <!-- SOURCES -->
    <text x="180" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#252423">Data Sources</text>
    <rect x="34" y="66" width="290" height="600" rx="12" fill="none" stroke="#3b3a38" stroke-width="2.2"/>
    <g stroke="#3b3a38" stroke-width="2" fill="#f4f6f8">
      <rect x="150" y="88" width="60" height="56"/><line x1="180" y1="88" x2="180" y2="76"/><path d="M180 76 h14 v9 h-14" fill="#3b3a38"/>
      <g fill="#cfe0f2" stroke-width="1.3"><rect x="157" y="96" width="9" height="9"/><rect x="170" y="96" width="9" height="9"/><rect x="183" y="96" width="9" height="9"/><rect x="196" y="96" width="9" height="9"/><rect x="157" y="110" width="9" height="9"/><rect x="170" y="110" width="9" height="9"/><rect x="183" y="110" width="9" height="9"/><rect x="196" y="110" width="9" height="9"/></g>
    </g>
    <g fill="#f2f5f8" stroke="#6b6f76" stroke-width="2.2"><ellipse cx="230" cy="188" rx="42" ry="13"/><path d="M188 188 V236 a42 13 0 0 0 84 0 V188"/></g>
    <text x="230" y="222" text-anchor="middle" font-size="18" font-weight="700" fill="#3b3a38">Sales</text>
    <text x="230" y="270" text-anchor="middle" font-size="15" fill="#6c6f76">Database</text>
    <g fill="#f2f5f8" stroke="#6b6f76" stroke-width="2"><ellipse cx="105" cy="200" rx="30" ry="9"/><path d="M75 200 V232 a30 9 0 0 0 60 0 V200"/></g>
    <text x="105" y="222" text-anchor="middle" font-size="13" fill="#6c6f76">Customer</text>
    <g stroke="#6b6f76" stroke-width="2"><rect x="150" y="300" width="70" height="52" rx="2" fill="#dfe7ef"/><rect x="138" y="312" width="70" height="52" rx="2" fill="#eef3f8"/><line x1="138" y1="328" x2="208" y2="328" stroke-width="1.4"/><line x1="160" y1="312" x2="160" y2="364" stroke-width="1.4"/></g>
    <text x="173" y="392" text-anchor="middle" font-size="15" fill="#6c6f76">Sheets</text>
    <path d="M78 466 a18 18 0 0 1 7 -35 a22 22 0 0 1 42 4 a16 16 0 0 1 -2 31 z" fill="#dbeaf5" stroke="#7fb0d4" stroke-width="2.2"/>
    <text x="103" y="498" text-anchor="middle" font-size="15" fill="#6c6f76">Cloud</text>
    <g stroke="#118DFF" stroke-width="2.2" fill="#cfe0f2"><circle cx="215" cy="452" r="8"/><circle cx="252" cy="438" r="8"/><circle cx="255" cy="474" r="8"/><line x1="222" y1="452" x2="245" y2="443" stroke-width="1.8"/><line x1="221" y1="457" x2="248" y2="470" stroke-width="1.8"/></g>
    <text x="235" y="500" text-anchor="middle" font-size="15" fill="#6c6f76">Streaming</text>
    <g transform="translate(120,556)" fill="#cfe0f2" stroke="#118DFF" stroke-width="2"><path d="M0-26 6-24 8-32 16-30 15-22 22-18 28-24 34-16 27-11 29-3 37 0 35 8 27 8 24 15 30 21 22 28 16 22 8 25 8 33 0 31 -3 26z" transform="scale(0.68)"/><circle r="7" fill="#fff"/></g>
    <text x="120" y="606" text-anchor="middle" font-size="15" fill="#6c6f76">APIs</text>

    <!-- feeder arrows into the three tracks -->
    <path d="M330 210 q40 -10 60 -20" fill="none" stroke="#F2A20C" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arw)"/>
    <path d="M330 360 h60" fill="none" stroke="#F2A20C" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arw)"/>
    <path d="M330 520 q40 12 60 22" fill="none" stroke="#F2A20C" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arw)"/>

    <!-- TRACK 1: SALES -->
    <use href="#an" x="470" y="150"/>
    <rect x="415" y="180" width="110" height="26" rx="3" fill="#eef3f8" stroke="#c8ccd1"/><text x="470" y="199" text-anchor="middle" font-size="15" font-weight="700" fill="#252423">Sales</text>
    <use href="#xl" transform="translate(560,150)"/><text x="600" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#D9302A">V1</text>
    <path d="M636 178 q30 8 50 0" fill="none" stroke="#F2A20C" stroke-width="4" stroke-linecap="round" marker-end="url(#arw)"/>
    <use href="#xl" transform="translate(700,158)"/><use href="#xl" transform="translate(694,150)"/><text x="742" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#D9302A">Report 30</text>
    <g stroke="#3b3a38" stroke-width="2" fill="#fff"><circle cx="880" cy="150" r="20"/><line x1="880" y1="150" x2="880" y2="136"/><line x1="880" y1="150" x2="890" y2="156"/></g>
    <text x="880" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#252423">2 weeks</text>
    <text x="1000" y="230" text-anchor="middle" font-size="22" font-weight="700" fill="#252423">50M</text>

    <!-- TRACK 2: FINANCE -->
    <use href="#an" x="470" y="330"/>
    <rect x="415" y="360" width="110" height="26" rx="3" fill="#eef3f8" stroke="#c8ccd1"/><text x="470" y="379" text-anchor="middle" font-size="15" font-weight="700" fill="#252423">Finance</text>
    <use href="#xl" transform="translate(560,330)"/><text x="594" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#D9302A">V1.0</text>
    <path d="M636 358 q26 12 46 6" fill="none" stroke="#F2A20C" stroke-width="4" stroke-linecap="round" marker-end="url(#arw)"/>
    <use href="#xl" transform="translate(690,352)"/><text x="724" y="432" text-anchor="middle" font-size="14" font-weight="700" fill="#D9302A">V1.1</text>
    <path d="M760 386 q30 -6 52 -18" fill="none" stroke="#F2A20C" stroke-width="4" stroke-linecap="round" marker-end="url(#arw)"/>
    <use href="#xl" transform="translate(820,318)"/><text x="854" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#D9302A">Final V2</text>
    <g stroke="#3b3a38" stroke-width="2" fill="#fff"><circle cx="880" cy="404" r="18"/><line x1="880" y1="404" x2="880" y2="392"/><line x1="880" y1="404" x2="889" y2="409"/></g>
    <text x="880" y="446" text-anchor="middle" font-size="16" font-weight="700" fill="#252423">1 week</text>
    <text x="1000" y="410" text-anchor="middle" font-size="22" font-weight="700" fill="#252423">30M</text>

    <!-- TRACK 3: MARKETING -->
    <use href="#an" x="470" y="512"/>
    <rect x="405" y="542" width="130" height="26" rx="3" fill="#eef3f8" stroke="#c8ccd1"/><text x="470" y="561" text-anchor="middle" font-size="15" font-weight="700" fill="#252423">Marketing</text>
    <use href="#xl" transform="translate(555,560)"/><text x="589" y="640" text-anchor="middle" font-size="14" font-weight="700" fill="#D9302A">Final</text>
    <path d="M631 588 q30 -6 52 0" fill="none" stroke="#F2A20C" stroke-width="4" stroke-linecap="round" marker-end="url(#arw)"/>
    <use href="#xl" transform="translate(700,552)"/><text x="734" y="632" text-anchor="middle" font-size="13" font-weight="700" fill="#D9302A">Final Final</text>
    <path d="M776 580 q28 -10 46 -22" fill="none" stroke="#F2A20C" stroke-width="4" stroke-linecap="round" marker-end="url(#arw)"/>
    <use href="#xl" transform="translate(830,510)"/><text x="864" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#D9302A">Final V2.0</text>
    <g stroke="#3b3a38" stroke-width="2" fill="#fff"><circle cx="890" cy="596" r="18"/><line x1="890" y1="596" x2="890" y2="584"/><line x1="890" y1="596" x2="899" y2="601"/></g>
    <text x="892" y="638" text-anchor="middle" font-size="16" font-weight="700" fill="#252423">Yesterday</text>
    <text x="1000" y="560" text-anchor="middle" font-size="22" font-weight="700" fill="#252423">5M</text>

    <!-- BIG RED X over the chaos -->
    <g stroke="#D9302A" stroke-width="14" stroke-linecap="round" opacity="0.85">
      <line x1="410" y1="120" x2="1060" y2="620"/><line x1="1060" y1="120" x2="410" y2="620"/>
    </g>

    <!-- MANAGERS confused -->
    <path d="M1150 210 a30 30 0 0 1 12 -56 a34 34 0 0 1 64 6 a24 24 0 0 1 -4 46 z" fill="#eef3f8" stroke="#9aa0a6" stroke-width="2"/>
    <text x="1190" y="200" text-anchor="middle" font-size="34" font-weight="800" fill="#D9302A">?</text>
    <ellipse cx="1190" cy="360" rx="80" ry="16" fill="#f2f5f8" stroke="#c8ccd1"/>
    <use href="#mgr" x="1150" y="322"/><use href="#mgr" x="1190" y="316"/><use href="#mgr" x="1230" y="322"/>
    <rect x="1148" y="376" width="84" height="26" rx="3" fill="#f7ddd3" stroke="#dcae9f"/><text x="1190" y="395" text-anchor="middle" font-size="16" font-weight="700" fill="#252423">Managers</text>

    <!-- DRAWBACKS -->
    <line x1="1352" y1="40" x2="1352" y2="680" stroke="#b9bec6" stroke-width="2" stroke-dasharray="4 8"/>
    <text x="1478" y="70" text-anchor="middle" font-size="30" font-weight="800" fill="#252423">Drawbacks</text>
    <rect x="1392" y="80" width="172" height="5" rx="2.5" fill="#D9302A"/>
    <g font-size="21" font-weight="700" fill="#252423">
      <g stroke="#D9302A" stroke-width="4" stroke-linecap="round"><line x1="1378" y1="118" x2="1396" y2="136"/><line x1="1396" y1="118" x2="1378" y2="136"/></g><text x="1408" y="134" font-size="24" font-weight="800">CHAOS</text>
      <g stroke="#D9302A" stroke-width="3.5" stroke-linecap="round"><line x1="1380" y1="176" x2="1396" y2="192"/><line x1="1396" y1="176" x2="1380" y2="192"/></g><text x="1408" y="190">Manual</text>
      <g stroke="#D9302A" stroke-width="3.5" stroke-linecap="round"><line x1="1380" y1="230" x2="1396" y2="246"/><line x1="1396" y1="230" x2="1380" y2="246"/></g><text x="1408" y="244">Outdated</text>
      <g stroke="#D9302A" stroke-width="3.5" stroke-linecap="round"><line x1="1380" y1="284" x2="1396" y2="300"/><line x1="1396" y1="284" x2="1380" y2="300"/></g><text x="1408" y="298">No refresh</text>
      <g stroke="#D9302A" stroke-width="3.5" stroke-linecap="round"><line x1="1380" y1="338" x2="1396" y2="354"/><line x1="1396" y1="338" x2="1380" y2="354"/></g><text x="1408" y="352">Hard to connect</text>
      <g stroke="#D9302A" stroke-width="3.5" stroke-linecap="round"><line x1="1380" y1="392" x2="1396" y2="408"/><line x1="1396" y1="392" x2="1380" y2="408"/></g><text x="1408" y="406">Big data</text>
      <g stroke="#D9302A" stroke-width="3.5" stroke-linecap="round"><line x1="1380" y1="446" x2="1396" y2="462"/><line x1="1396" y1="446" x2="1380" y2="462"/></g><text x="1408" y="460">Can&#39;t collaborate</text>
      <g stroke="#D9302A" stroke-width="3.5" stroke-linecap="round"><line x1="1380" y1="500" x2="1396" y2="516"/><line x1="1396" y1="500" x2="1380" y2="516"/></g><text x="1408" y="514">Unsecured</text>
      <g stroke="#D9302A" stroke-width="3.5" stroke-linecap="round"><line x1="1380" y1="554" x2="1396" y2="570"/><line x1="1396" y1="554" x2="1380" y2="570"/></g><text x="1408" y="568">No access control</text>
    </g>
  </g>
</svg>
