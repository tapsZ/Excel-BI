<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="A raw data table full of problems: a blank (null) sales value, a whole row of ERROR, the ID 1003 duplicated with the name spelled MARIA on one row and maria on another, and a malformed value 40/40 — the kind of mess Power Query cleans up.">
  <rect width="560" height="380" fill="#ffffff"/>

  <!-- row tints: header (peach) + ERROR row (light red) -->
  <rect x="25" y="25"  width="510" height="55" fill="#f7ddd3"/>
  <rect x="25" y="190" width="510" height="55" fill="#fceceb"/>

  <!-- outer border -->
  <rect x="25" y="25" width="510" height="330" fill="none" stroke="#3b3a38" stroke-width="2.5"/>

  <!-- grid: horizontal -->
  <g stroke="#c8c3bf" stroke-width="1.6">
    <line x1="25" y1="80"  x2="535" y2="80"/>
    <line x1="25" y1="135" x2="535" y2="135"/>
    <line x1="25" y1="190" x2="535" y2="190"/>
    <line x1="25" y1="245" x2="535" y2="245"/>
    <line x1="25" y1="300" x2="535" y2="300"/>
  </g>
  <!-- header underline darker -->
  <line x1="25" y1="80" x2="535" y2="80" stroke="#3b3a38" stroke-width="2.2"/>
  <!-- grid: vertical -->
  <g stroke="#c8c3bf" stroke-width="1.6">
    <line x1="135" y1="25" x2="135" y2="355"/>
    <line x1="265" y1="25" x2="265" y2="355"/>
    <line x1="415" y1="25" x2="415" y2="355"/>
  </g>

  <!-- text -->
  <g font-size="21" fill="#252423" text-anchor="middle">
    <!-- headers -->
    <g font-weight="700">
      <text x="80"  y="60">ID</text>
      <text x="200" y="60">Name</text>
      <text x="340" y="60">Sales</text>
      <text x="475" y="60">Code</text>
    </g>

    <!-- row 1: 1002 | John | null | $30 -->
    <text x="80"  y="115">1002</text>
    <text x="200" y="115">John</text>
    <text x="340" y="115" fill="#E0912B" font-weight="700">null</text>
    <text x="475" y="115">$30</text>

    <!-- row 2: 1003 | MARIA | 35.8 | $15 -->
    <text x="80"  y="170">1003</text>
    <text x="200" y="170">MARIA</text>
    <text x="340" y="170">35.8</text>
    <text x="475" y="170">$15</text>

    <!-- row 3: ERROR row -->
    <g fill="#C4302B" font-weight="700">
      <text x="80"  y="225">1004</text>
      <text x="200" y="225">ERROR</text>
      <text x="340" y="225">ERROR</text>
      <text x="475" y="225">ERROR</text>
    </g>

    <!-- row 4: 1003 | maria | 35.8 | null  (duplicate id, lowercase) -->
    <text x="80"  y="280">1003</text>
    <text x="200" y="280">maria</text>
    <text x="340" y="280">35.8</text>
    <text x="475" y="280" fill="#E0912B" font-weight="700">null</text>

    <!-- row 5: 1005 | null | 40/40 | null -->
    <text x="80"  y="335">1005</text>
    <text x="200" y="335" fill="#E0912B" font-weight="700">null</text>
    <text x="340" y="335">40/40</text>
    <text x="475" y="335" fill="#E0912B" font-weight="700">null</text>
  </g>

  <!-- faint strike marks flagging the duplicate 1003 ids -->
  <g stroke="#d98f8f" stroke-width="2" opacity="0.8">
    <line x1="52" y1="176" x2="108" y2="160"/>
    <line x1="52" y1="286" x2="108" y2="270"/>
  </g>
</svg>
