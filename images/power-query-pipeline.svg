<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 420" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="The Power Query pipeline: messy data enters, passes through five ordered steps — 1 Connect, 2 Remove bad data, 3 Split, 4 Merge, 5 Remove spaces — and clean data comes out.">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#F2A20C"/></marker>
  </defs>
  <rect width="1680" height="420" fill="#ffffff"/>

  <!-- title -->
  <g transform="translate(704,26)"><rect x="0" y="12" width="12" height="30" rx="2" fill="#F2C811"/><rect x="16" y="2" width="12" height="40" rx="2" fill="#F2C811"/><rect x="32" y="-6" width="12" height="48" rx="2" fill="#E6A700"/></g>
  <text x="760" y="62" font-size="34" font-weight="700" fill="#252423">Power Query</text>
  <rect x="762" y="70" width="196" height="6" rx="3" fill="#F2C811"/>

  <!-- messy input table -->
  <g transform="translate(16,150)" stroke="#6b6f76" stroke-width="1.8" fill="#e9ecef"><rect x="-11" y="0" width="22" height="22" rx="2"/><line x1="-14" y1="0" x2="14" y2="0"/><line x1="-5" y1="-5" x2="5" y2="-5"/></g>
  <rect x="30" y="140" width="206" height="40" fill="#f7ddd3"/><rect x="30" y="260" width="206" height="40" fill="#fceceb"/>
  <rect x="30" y="140" width="206" height="240" fill="none" stroke="#3b3a38" stroke-width="2"/>
  <g stroke="#c8c3bf" stroke-width="1.2"><line x1="30" y1="180" x2="236" y2="180"/><line x1="30" y1="220" x2="236" y2="220"/><line x1="30" y1="260" x2="236" y2="260"/><line x1="30" y1="300" x2="236" y2="300"/><line x1="30" y1="340" x2="236" y2="340"/><line x1="76" y1="140" x2="76" y2="380"/><line x1="134" y1="140" x2="134" y2="380"/><line x1="188" y1="140" x2="188" y2="380"/></g>
  <line x1="30" y1="180" x2="236" y2="180" stroke="#3b3a38" stroke-width="1.8"/>
  <g font-size="12.5" fill="#252423" text-anchor="middle">
    <g font-weight="700"><text x="53" y="166">ID</text><text x="105" y="166">Name</text><text x="161" y="166">Sales</text><text x="212" y="166">Code</text></g>
    <text x="53" y="205">1002</text><text x="105" y="205">John</text><text x="161" y="205" fill="#E0912B" font-weight="700">null</text><text x="212" y="205">$30</text>
    <text x="53" y="245">1003</text><text x="105" y="245">MARIA</text><text x="161" y="245">35.8</text><text x="212" y="245">$15</text>
    <g fill="#C4302B" font-weight="700"><text x="53" y="285">1004</text><text x="105" y="285">ERROR</text><text x="161" y="285">ERROR</text><text x="212" y="285">ERROR</text></g>
    <text x="53" y="325">1003</text><text x="105" y="325">maria</text><text x="161" y="325">35.8</text><text x="212" y="325" fill="#E0912B" font-weight="700">null</text>
    <text x="53" y="365">1005</text><text x="105" y="365" fill="#E0912B" font-weight="700">null</text><text x="161" y="365">40/40</text><text x="212" y="365" fill="#E0912B" font-weight="700">null</text>
  </g>
  <path d="M244 258 H300" fill="none" stroke="#F2A20C" stroke-width="5" stroke-linecap="round" marker-end="url(#ar)"/>

  <!-- pipeline tube -->
  <rect x="308" y="176" width="1064" height="164" rx="14" fill="#fdf3d0" stroke="#e0c46a" stroke-width="2.5"/>
  <ellipse cx="1372" cy="258" rx="16" ry="82" fill="#f6e6a4" stroke="#e0c46a" stroke-width="2.5"/>
  <ellipse cx="308" cy="258" rx="16" ry="82" fill="#fdf3d0" stroke="#e0c46a" stroke-width="2.5"/>

  <!-- 5 step cards -->
  <g>
    <!-- centres: 400 600 800 1000 1200 -->
    <g>
      <rect x="330" y="206" width="140" height="104" rx="8" fill="#ffffff" stroke="#c8ccd1" stroke-width="1.8"/>
      <circle cx="400" cy="196" r="19" fill="#118DFF"/><text x="400" y="203" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">1</text>
      <text x="400" y="248" text-anchor="middle" font-size="14" fill="#787c83">Step</text>
      <text x="400" y="274" text-anchor="middle" font-size="18" font-weight="700" fill="#252423">Connect</text>
    </g>
    <path d="M472 258 H528" fill="none" stroke="#F2A20C" stroke-width="4.5" stroke-linecap="round" marker-end="url(#ar)"/>
    <g>
      <rect x="530" y="206" width="140" height="104" rx="8" fill="#ffffff" stroke="#c8ccd1" stroke-width="1.8"/>
      <circle cx="600" cy="196" r="19" fill="#118DFF"/><text x="600" y="203" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">2</text>
      <text x="600" y="244" text-anchor="middle" font-size="14" fill="#787c83">Step</text>
      <text x="600" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#252423">Remove</text>
      <text x="600" y="288" text-anchor="middle" font-size="17" font-weight="700" fill="#252423">bad data</text>
    </g>
    <path d="M672 258 H728" fill="none" stroke="#F2A20C" stroke-width="4.5" stroke-linecap="round" marker-end="url(#ar)"/>
    <g>
      <rect x="730" y="206" width="140" height="104" rx="8" fill="#ffffff" stroke="#c8ccd1" stroke-width="1.8"/>
      <circle cx="800" cy="196" r="19" fill="#118DFF"/><text x="800" y="203" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">3</text>
      <text x="800" y="248" text-anchor="middle" font-size="14" fill="#787c83">Step</text>
      <text x="800" y="274" text-anchor="middle" font-size="18" font-weight="700" fill="#252423">Split</text>
    </g>
    <path d="M872 258 H928" fill="none" stroke="#F2A20C" stroke-width="4.5" stroke-linecap="round" marker-end="url(#ar)"/>
    <g>
      <rect x="930" y="206" width="140" height="104" rx="8" fill="#ffffff" stroke="#c8ccd1" stroke-width="1.8"/>
      <circle cx="1000" cy="196" r="19" fill="#118DFF"/><text x="1000" y="203" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">4</text>
      <text x="1000" y="248" text-anchor="middle" font-size="14" fill="#787c83">Step</text>
      <text x="1000" y="274" text-anchor="middle" font-size="18" font-weight="700" fill="#252423">Merge</text>
    </g>
    <path d="M1072 258 H1128" fill="none" stroke="#F2A20C" stroke-width="4.5" stroke-linecap="round" marker-end="url(#ar)"/>
    <g>
      <rect x="1130" y="206" width="140" height="104" rx="8" fill="#ffffff" stroke="#c8ccd1" stroke-width="1.8"/>
      <circle cx="1200" cy="196" r="19" fill="#118DFF"/><text x="1200" y="203" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">5</text>
      <text x="1200" y="244" text-anchor="middle" font-size="14" fill="#787c83">Step</text>
      <text x="1200" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#252423">Remove</text>
      <text x="1200" y="288" text-anchor="middle" font-size="17" font-weight="700" fill="#252423">spaces</text>
    </g>
  </g>

  <!-- exit arrow -->
  <path d="M1392 258 H1448" fill="none" stroke="#F2A20C" stroke-width="5" stroke-linecap="round" marker-end="url(#ar)"/>

  <!-- clean output table -->
  <text x="1648" y="168" font-size="20" fill="#F2C811">&#10022;</text>
  <rect x="1462" y="176" width="196" height="36" fill="#d8f0dd"/>
  <rect x="1462" y="176" width="196" height="168" fill="none" stroke="#3b3a38" stroke-width="2"/>
  <g stroke="#c8c3bf" stroke-width="1.3"><line x1="1462" y1="212" x2="1658" y2="212"/><line x1="1462" y1="256" x2="1658" y2="256"/><line x1="1462" y1="300" x2="1658" y2="300"/><line x1="1524" y1="176" x2="1524" y2="344"/><line x1="1596" y1="176" x2="1596" y2="344"/></g>
  <line x1="1462" y1="212" x2="1658" y2="212" stroke="#3b3a38" stroke-width="1.8"/>
  <g font-size="15" fill="#252423" text-anchor="middle">
    <g font-weight="700"><text x="1493" y="201">ID</text><text x="1560" y="201">Name</text><text x="1627" y="201">Price</text></g>
    <text x="1493" y="240">1002</text><text x="1560" y="240">John</text><text x="1627" y="240">30</text>
    <text x="1493" y="284">1003</text><text x="1560" y="284">Mario</text><text x="1627" y="284">40</text>
    <text x="1493" y="328">1005</text><text x="1560" y="328">N/A</text><text x="1627" y="328">50</text>
  </g>
</svg>
