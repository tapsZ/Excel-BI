<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 300" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="The 45-Minute Dashboard Dash: six timed rounds worth 100 points in total — Round 0 Trap Hunt, 3 minutes, 10 points; Round 1 Clean, 12 minutes, 25 points; Round 2 Model, 8 minutes, 15 points; Round 3 Measure, 10 minutes, 20 points; Round 4 Build, 10 minutes, 25 points; Round 5 Pitch, 2 minutes, 5 points.">
  <rect width="1240" height="300" fill="#ffffff"/>

  <!-- title -->
  <text x="620" y="42" text-anchor="middle" font-size="25" font-weight="700" fill="#252423">The 45-Minute Dashboard Dash</text>
  <text x="620" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#6c6f76">six rounds &#183; 45 minutes &#183; 100 points</text>

  <!-- track -->
  <line x1="110" y1="160" x2="1130" y2="160" stroke="#e3e6ea" stroke-width="8" stroke-linecap="round"/>
  <line x1="110" y1="160" x2="1130" y2="160" stroke="#F2C811" stroke-width="8" stroke-linecap="round" stroke-dasharray="14 16"/>

  <!-- ROUND 0 -->
  <text x="110" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#252423">Trap Hunt</text>
  <circle cx="110" cy="160" r="30" fill="#6b6f76" stroke="#ffffff" stroke-width="5"/>
  <text x="110" y="169" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">0</text>
  <text x="110" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#3b3f45">3 min</text>
  <text x="110" y="242" text-anchor="middle" font-size="13" fill="#6c6f76">10 pts</text>

  <!-- ROUND 1 -->
  <text x="314" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#252423">Clean</text>
  <circle cx="314" cy="160" r="30" fill="#F2A20C" stroke="#ffffff" stroke-width="5"/>
  <text x="314" y="169" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">1</text>
  <text x="314" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#3b3f45">12 min</text>
  <text x="314" y="242" text-anchor="middle" font-size="13" fill="#6c6f76">25 pts</text>

  <!-- ROUND 2 -->
  <text x="518" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#252423">Model</text>
  <circle cx="518" cy="160" r="30" fill="#F2A20C" stroke="#ffffff" stroke-width="5"/>
  <text x="518" y="169" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">2</text>
  <text x="518" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#3b3f45">8 min</text>
  <text x="518" y="242" text-anchor="middle" font-size="13" fill="#6c6f76">15 pts</text>

  <!-- ROUND 3 -->
  <text x="722" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#252423">Measure</text>
  <circle cx="722" cy="160" r="30" fill="#F2C811" stroke="#ffffff" stroke-width="5"/>
  <text x="722" y="169" text-anchor="middle" font-size="22" font-weight="700" fill="#252423">3</text>
  <text x="722" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#3b3f45">10 min</text>
  <text x="722" y="242" text-anchor="middle" font-size="13" fill="#6c6f76">20 pts</text>

  <!-- ROUND 4 -->
  <text x="926" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#252423">Build</text>
  <circle cx="926" cy="160" r="30" fill="#157878" stroke="#ffffff" stroke-width="5"/>
  <text x="926" y="169" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">4</text>
  <text x="926" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#3b3f45">10 min</text>
  <text x="926" y="242" text-anchor="middle" font-size="13" fill="#6c6f76">25 pts</text>

  <!-- ROUND 5 -->
  <text x="1130" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#252423">Pitch</text>
  <circle cx="1130" cy="160" r="30" fill="#157878" stroke="#ffffff" stroke-width="5"/>
  <text x="1130" y="169" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">5</text>
  <text x="1130" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#3b3f45">2 min</text>
  <text x="1130" y="242" text-anchor="middle" font-size="13" fill="#6c6f76">5 pts</text>

  <!-- phase captions -->
  <text x="314" y="284" text-anchor="middle" font-size="13" font-weight="600" fill="#F2A20C" letter-spacing="1.5">MAKE IT TRUE</text>
  <text x="722" y="284" text-anchor="middle" font-size="13" font-weight="600" fill="#b8940c" letter-spacing="1.5">MAKE IT COUNT</text>
  <text x="1028" y="284" text-anchor="middle" font-size="13" font-weight="600" fill="#157878" letter-spacing="1.5">MAKE IT MATTER</text>
</svg>
